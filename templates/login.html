<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Robot Console AI</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width: 420px; margin-top: 12vh;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h3 class="mb-3">Robot Console AI</h3>
      <p class="text-muted">Local admin for LLM and VLM services on this Pi.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category if category in ['success','danger','warning','info'] else 'secondary' }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" value="admin" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Log in</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
